# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: CI-CD

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Stub frontend dist for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Execute unit tests
        run: go test -race ./...

  test-frontend:
    needs: [test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '26.4.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install NPM dependencies
        working-directory: frontend
        run: npm ci

      - name: Execute unit tests
        working-directory: frontend
        run: npm run test:unit

  release-tag:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false

      - name: Create release
        if: steps.tag.outputs.new_tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  deploy:
    needs: release-tag
    if: needs.release-tag.outputs.new_tag != ''
    strategy:
      fail-fast: false
      matrix:
        build: [
          {name: Tider, platform: linux/amd64, os: ubuntu-latest},
          {name: Tider, platform: windows/amd64, os: windows-latest},
          {name: Tider, platform: darwin/universal, os: macos-latest}
        ]
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dAppServer/wails-build-action@main
        with:
          go-version: '1.24'
          node-version: '26.4.0'
          wails-version: 'v2.10.1'
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          build-obfuscate: false

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-tag.outputs.new_tag }}
          files: |
            build/bin/${{ matrix.build.name }}
            build/bin/${{ matrix.build.name }}.exe
            build/bin/${{ matrix.build.name }}-amd64-installer.exe
            build/bin/${{ matrix.build.name }}.app.zip
